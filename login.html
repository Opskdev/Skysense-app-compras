<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso · Control de Pagos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", -apple-system, Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff; color: #0f172a;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card { width: 100%; max-width: 400px; border: 1px solid #e6e9f0; border-radius: 18px;
      padding: 36px 32px; box-shadow: 0 10px 40px rgba(15,23,42,.06); }
    .logo { width: 58px; height: 58px; margin: 0 auto 18px; border-radius: 15px;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; font-weight: 800;
      box-shadow: 0 6px 16px rgba(37,99,235,.3); }
    h2 { text-align: center; font-size: 21px; margin-bottom: 4px; }
    .muted { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 26px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; outline: none; transition:.15s; }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .btn { width: 100%; margin-top: 20px; background: #2563eb; color: #fff; border: none;
      padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition:.15s; }
    .btn:hover { background: #1e40af; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .links { margin-top: 18px; text-align: center; font-size: 13px; }
    .links a { color: #2563eb; cursor: pointer; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .sep { margin: 0 8px; color: #d1d5db; }
    .msg { margin-top: 16px; padding: 11px 14px; border-radius: 10px; font-size: 13px; display: none; }
    .msg.err { background: #fef2f2; color: #b91c1c; display: block; }
    .msg.ok  { background: #ecfdf5; color: #047857; display: block; }
    .hidden { display: none; }
    .back { text-align:center; margin-top:22px; font-size:13px; }
    .back a { color:#94a3b8; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CP</div>

    <section id="view-login">
      <h2>Iniciar sesión</h2>
      <p class="muted">Accede a Control de Pagos</p>
      <label>Correo</label>
      <input id="login-email" type="email" placeholder="tucorreo@skysense.com.mx" />
      <label>Contraseña</label>
      <input id="login-pass" type="password" placeholder="••••••••" />
      <button class="btn" id="btn-login">Entrar</button>
      <div class="links">
        <a id="go-signup">Crear cuenta</a>
        <span class="sep">·</span>
        <a id="go-reset">¿Olvidaste tu contraseña?</a>
      </div>
    </section>

    <section id="view-signup" class="hidden">
      <h2>Crear cuenta</h2>
      <p class="muted">Regístrate con tu correo</p>
      <label>Correo</label>
      <input id="su-email" type="email" placeholder="tucorreo@skysense.com.mx" />
      <label>Contraseña (mín. 6 caracteres)</label>
      <input id="su-pass" type="password" placeholder="••••••••" />
      <button class="btn" id="btn-signup">Registrarme</button>
      <div class="links"><a id="back-login-1">← Volver a iniciar sesión</a></div>
    </section>

    <section id="view-reset" class="hidden">
      <h2>Restablecer contraseña</h2>
      <p class="muted">Te enviaremos un enlace a tu correo</p>
      <label>Correo</label>
      <input id="rs-email" type="email" placeholder="tucorreo@skysense.com.mx" />
      <button class="btn" id="btn-reset">Enviar enlace</button>
      <div class="links"><a id="back-login-2">← Volver a iniciar sesión</a></div>
    </section>

    <div id="msg" class="msg"></div>
    <div class="back"><a href="index.html">← Inicio</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const msg = $("msg");
    function show(t, ok=false){ msg.textContent=t; msg.className="msg "+(ok?"ok":"err"); }
    function clearMsg(){ msg.className="msg"; msg.textContent=""; }
    function view(v){
      ["login","signup","reset"].forEach(x=>$("view-"+x).classList.toggle("hidden", x!==v));
      clearMsg();
    }
    $("go-signup").onclick    = ()=>view("signup");
    $("go-reset").onclick     = ()=>view("reset");
    $("back-login-1").onclick = ()=>view("login");
    $("back-login-2").onclick = ()=>view("login");

    (async ()=>{
      const { data:{ session } } = await sb.auth.getSession();
      if (session) location.href = "app.html";
    })();

    $("btn-login").onclick = async () => {
      clearMsg();
      const email = $("login-email").value.trim();
      const password = $("login-pass").value;
      if(!email || !password) return show("Ingresa correo y contraseña.");
      $("btn-login").disabled = true;
      try {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) return show(traducir(error.message));
        await logEvento("login", "Inicio de sesión");
        location.href = "app.html";
      } catch (e) { show("No se pudo conectar. Revisa tu internet e intenta de nuevo."); }
      finally { $("btn-login").disabled = false; }
    };

    $("btn-signup").onclick = async () => {
      clearMsg();
      const email = $("su-email").value.trim();
      const password = $("su-pass").value;
      if(!email || password.length < 6) return show("Correo válido y contraseña de mín. 6 caracteres.");
      $("btn-signup").disabled = true;
      try {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) return show(traducir(error.message));
        if (data && data.session) { await logEvento("signup","Cuenta creada"); location.href = "app.html"; return; }
        show("Cuenta creada. Revisa tu correo para confirmar y luego inicia sesión.", true);
        setTimeout(()=>view("login"), 3500);
      } catch (e) { show("No se pudo conectar. Revisa tu internet e intenta de nuevo."); }
      finally { $("btn-signup").disabled = false; }
    };

    $("btn-reset").onclick = async () => {
      clearMsg();
      const email = $("rs-email").value.trim();
      if(!email) return show("Ingresa tu correo.");
      $("btn-reset").disabled = true;
      try {
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: location.origin + location.pathname.replace("login.html","app.html")
        });
        if (error) return show(traducir(error.message));
        show("Enlace enviado. Revisa tu correo.", true);
      } catch (e) { show("No se pudo conectar. Revisa tu internet e intenta de nuevo."); }
      finally { $("btn-reset").disabled = false; }
    };

    function traducir(m){
      if(/Invalid login credentials/i.test(m)) return "Correo o contraseña incorrectos.";
      if(/already registered|already been registered/i.test(m)) return "Ese correo ya está registrado. Intenta iniciar sesión.";
      if(/Email not confirmed/i.test(m)) return "Confirma tu correo antes de entrar.";
      if(/rate limit/i.test(m)) return "Demasiadas solicitudes en poco tiempo. Espera unos minutos e inténtalo de nuevo.";
      if(/at least 6|password.*6/i.test(m)) return "La contraseña debe tener al menos 6 caracteres.";
      if(/valid email|invalid.*email|unable to validate/i.test(m)) return "El correo no es válido.";
      if(/network|failed to fetch/i.test(m)) return "No se pudo conectar. Revisa tu internet e intenta de nuevo.";
      return "Ocurrió un error. Intenta de nuevo o contacta al administrador.";
    }
  </script>
</body>
</html>
